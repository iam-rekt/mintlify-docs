<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;600;700&display=swap");

      * { box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
      body {
        color: #0c211a;
        background: #f2f1e9;
        font-family: "Instrument Sans", Arial, sans-serif;
        font-variant-numeric: tabular-nums;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 50px 58px 46px;
        border: 14px solid #0c211a;
        overflow: hidden;
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: .22;
        background-image:
          linear-gradient(#aeb6ac 1px, transparent 1px),
          linear-gradient(90deg, #aeb6ac 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(90deg, transparent 0, transparent 38%, #000 64%, #000 100%);
      }

      .topbar, .content, .footer { position: relative; z-index: 1; }
      .topbar { display: flex; align-items: center; justify-content: space-between; }
      .brand { display: flex; align-items: center; gap: 15px; }
      .brand strong { font-size: 23px; letter-spacing: -.8px; }
      .brand span { display: block; margin-top: 1px; color: #667169; font-size: 12px; }
      .mark { width: 42px; height: 42px; }
      .chain {
        padding: 9px 14px;
        border: 1px solid #c9cdc2;
        border-radius: 999px;
        background: rgba(255,254,247,.82);
        color: #286d4b;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      .content {
        display: grid;
        grid-template-columns: 1.02fr .98fr;
        gap: 58px;
        align-items: center;
        height: 430px;
      }
      .eyebrow {
        margin: 0 0 18px;
        color: #286d4b;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: .105em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: 72px;
        font-weight: 600;
        letter-spacing: -5px;
        line-height: .92;
      }
      h1 em { color: #75ca00; font-style: normal; }
      .copy {
        width: 470px;
        margin: 24px 0 0;
        color: #59665e;
        font-size: 19px;
        line-height: 1.45;
      }

      .instrument {
        position: relative;
        height: 330px;
        padding: 25px 27px;
        border: 1px solid #cdd0c6;
        border-radius: 26px;
        background: rgba(255,254,247,.91);
        box-shadow: 0 22px 70px rgba(12,33,26,.08);
      }
      .instrument-head { display: flex; align-items: center; justify-content: space-between; }
      .instrument-head span { color: #68736b; font-size: 12px; }
      .instrument-head strong { color: #286d4b; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; }
      .plot { position: relative; height: 202px; margin-top: 20px; border-left: 1px solid #d1d4ca; border-bottom: 1px solid #d1d4ca; }
      .plot::before, .plot::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 1px;
        background: #e3e4dd;
      }
      .plot::before { top: 67px; }
      .plot::after { top: 134px; }
      .market-line {
        position: absolute;
        left: 12px;
        right: 8px;
        top: 111px;
        height: 3px;
        background: #bdc4ba;
        transform: rotate(-7deg);
        transform-origin: center;
      }
      .active-line {
        position: absolute;
        left: 55px;
        width: 292px;
        top: 101px;
        height: 10px;
        border-radius: 10px;
        background: #75ca00;
        transform: rotate(-7deg);
        box-shadow: 0 0 0 4px rgba(117,202,0,.11);
      }
      .price {
        position: absolute;
        left: 292px;
        top: 70px;
        width: 20px;
        height: 20px;
        border: 4px solid #fffef7;
        border-radius: 50%;
        background: #75ca00;
        box-shadow: 0 0 0 2px #75ca00;
      }
      .labels { display: flex; justify-content: space-between; padding: 13px 1px 0; color: #7b857d; font-size: 10px; }
      .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
      .modes div { padding-top: 10px; border-top: 2px solid #d3d6cc; color: #7d877f; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
      .modes div:first-child { border-color: #75ca00; color: #0c211a; }

      .footer { display: flex; align-items: center; justify-content: space-between; padding-top: 15px; border-top: 1px solid #cdd0c6; }
      .footer strong { font-size: 15px; letter-spacing: -.2px; }
      .footer span { color: #69746c; font-size: 12px; }
    </style>
  </head>
  <body>
    <main class="frame">
      <header class="topbar">
        <div class="brand">
          <svg class="mark" viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <path d="M9 21V9h12M27 9h12v12M39 27v12H27M21 39H9V27" stroke="#b7ff2a" stroke-width="9" stroke-linejoin="round"/>
            <path d="M9 21V9h12M27 9h12v12M39 27v12H27M21 39H9V27" stroke="#080b08" stroke-width="5.2" stroke-linejoin="round"/>
            <rect x="18" y="18" width="12" height="12" rx="3.5" fill="#b7ff2a"/>
            <rect x="20" y="20" width="8" height="8" rx="2" fill="#080b08"/>
          </svg>
          <div><strong>RobinSwap</strong><span>Documentation</span></div>
        </div>
        <div class="chain">Robinhood Chain · 4663</div>
      </header>

      <section class="content">
        <div>
          <p class="eyebrow">The RobinSwap field guide</p>
          <h1>Markets move.<br><em>You stay oriented.</em></h1>
          <p class="copy">Trade, provide liquidity, and manage every position with clarity.</p>
        </div>
        <div class="instrument">
          <div class="instrument-head"><span>Liquidity range</span><strong>Active</strong></div>
          <div class="plot"><i class="market-line"></i><i class="active-line"></i><i class="price"></i></div>
          <div class="labels"><span>Min</span><span>Market</span><span>Max</span></div>
          <div class="modes"><div>Trade</div><div>Provide</div><div>Manage</div></div>
        </div>
      </section>

      <footer class="footer"><strong>docs.robinswap.finance</strong><span>Built for Robinhood Chain</span></footer>
    </main>
  </body>
</html>
